{% extends "base.html" %}

{% block title %}
Register | Smart Lender
{% endblock %}

{% block content %}

<section class="auth-section">

    <div class="auth-card">

        <h1>Create Account</h1>

        <p>
            Join Smart Lender and start predicting loan approvals.
        </p>

        <form method="POST" class="auth-form">

            <div class="form-group">
                <label for="username">
                    Username
                </label>

                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter username"
                    required
                >
            </div>

            <div class="form-group">
                <label for="email">
                    Email Address
                </label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter email"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">
                    Password
                </label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter password"
                    required
                >
            </div>

            <div class="form-group">
                <label for="confirm_password">
                    Confirm Password
                </label>

                <input
                    type="password"
                    id="confirm_password"
                    name="confirm_password"
                    placeholder="Confirm password"
                    required
                >
            </div>

            <button
                type="submit"
                class="btn btn-primary"
            >
                Register
            </button>

        </form>

        <p class="auth-link">
            Already have an account?
            <a href="{{ url_for('login') }}">
                Login here
            </a>
        </p>

    </div>

</section>

{% endblock %}
