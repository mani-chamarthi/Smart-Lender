{% extends "base.html" %}

{% block title %}
Error | Smart Lender
{% endblock %}

{% block content %}

<section class="error-page">

    <div class="container">

        <div class="error-card">

            <div class="error-icon">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>

            <h1>Something Went Wrong</h1>

            <p class="error-message">
                We couldn't process your loan application request.
            </p>

            {% if error %}
            <div class="error-details">

                <h3>Error Details</h3>

                <p>{{ error }}</p>

            </div>
            {% endif %}

            <div class="button-group">

                <a
                    href="{{ url_for('predict_page') }}"
                    class="btn">

                    Try Again

                </a>

                <a
                    href="{{ url_for('home') }}"
                    class="btn secondary-btn">

                    Back Home

                </a>

            </div>

        </div>

    </div>

</section>

{% endblock %}
