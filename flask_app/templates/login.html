{% extends "base.html" %}

{% block title %}
Login | Smart Lender
{% endblock %}

{% block content %}

<section class="auth-section">

    <div class="auth-card">

        <h1>Welcome Back</h1>

        <p>
            Login to continue using Smart Lender
        </p>

        <form method="POST" class="auth-form">

            <div class="form-group">
                <label>Email Address</label>

                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    required
                >
            </div>

            <div class="form-group">
                <label>Password</label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                >
            </div>

            <button type="submit" class="btn btn-primary">
                Login
            </button>

        </form>

        <p class="auth-link">
            Don't have an account?
            <a href="{{ url_for('register') }}">
                Register here
            </a>
        </p>

    </div>

</section>

{% endblock %}
